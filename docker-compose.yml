# Terraform + AWS CLI Docker Compose
# This Compose file lets you run Terraform and AWS CLI in a container
version: '3.8'
services:
  terraform:
    build:
      context: ./infra
      dockerfile: Dockerfile
    volumes:
      - ./infra:/workspace
      - ~/.aws:/root/.aws:ro
    working_dir: /workspace
    entrypoint: ["/bin/sh"]
    tty: true
